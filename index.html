<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>the way to dream body + mind</title>
    <style>
        :root {
            --primary: #00f2fe;
            --secondary: #4facfe;
            --dark: #0a0f1d;
            --card-bg: rgba(255, 255, 255, 0.03);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: radial-gradient(circle at center, #1a233a 0%, var(--dark) 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 550px;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 35px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            position: relative;
        }

        .container::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            border-radius: 26px;
            z-index: -1;
            opacity: 0.3;
        }

        .screen {
            display: none;
            animation: fadeIn 0.5s ease-out forwards;
        }

        .screen.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1, h2 {
            text-align: center;
            margin-bottom: 25px;
            background: linear-gradient(135deg, #fff 30%, #a5b4fc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            text-align: center;
            color: #94a3b8;
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .btn {
            display: block;
            width: 100%;
            background: linear-gradient(135deg, var(--secondary) 0%, var(--primary) 100%);
            color: var(--dark);
            border: none;
            padding: 16px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.3);
            text-align: center;
            text-decoration: none;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 0 30px rgba(0, 242, 254, 0.6);
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #cbd5e1;
            font-size: 0.95rem;
        }

        input, select {
            width: 100%;
            padding: 14px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: #fff;
            font-size: 1rem;
            transition: all 0.3s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 10px rgba(0, 242, 254, 0.2);
        }
    </style>
</head>
<body>
   <div class="container">
        <div id="screen-welcome" class="screen active">
            <h1>برنامج اللياقة المتكامل</h1>
            <p>أهلاً بك! صمم نظامك الغذائي والتدريبي المخصص بالكامل بناءً على بيانات جسمك وأهدافك الصحية عبر خوارزمياتنا الذكية.</p>
            <button class="btn" onclick="startFitnessLogic()">ابدأ الآن واكتشف خطتك</button>
        </div>

        <div id="screen-form" class="screen">
            <h2>معلومات الجسم والهدف</h2>
            <form id="fitness-form" onsubmit="handleFormSubmit(event)">
                <div class="form-group">
                    <label>العمر (سنة)</label>
                    <input type="number" required min="12" max="80" id="age">
                </div>
                <div class="form-group">
                    <label>الوزن الحالي (كغم)</label>
                    <input type="number" required min="35" max="200" id="weight">
                </div>
                <div class="form-group">
                    <label>الطول (سم)</label>
                    <input type="number" required min="100" max="220" id="height">
                </div>
                <div class="form-group">
                    <label>الهدف الأساسي</label>
                    <select id="goal" required>
                        <option value="تنشيف وخسارة دهون">تنشيف وخسارة دهون</option>
                        <option value="تضخيم وبناء عضلات">تضخيم وبناء عضلات</option>
                        <option value="المحافظة على الوزن واللياقة">المحافظة على الوزن واللياقة</option>
                    </select>
                </div>
                <button type="submit" class="btn">احصل على خطتك عبر الواتساب</button>
            </form>
        </div>
    </div>

    <script>
        // دالة الانتقال من الشاشة الأولى إلى شاشة الفورم
        function startFitnessLogic() {
            document.getElementById('screen-welcome').classList.remove('active');
            document.getElementById('screen-form').classList.add('active');
        }

        // دالة معالجة إرسال البيانات وفتح الواتساب مباشرة
        function handleFormSubmit(event) {
            event.preventDefault(); // منع إعادة تحميل الصفحة
            
            const age = document.getElementById('age').value || "غير محدد";
            const weight = document.getElementById('weight').value || "غير محدد";
            const height = document.getElementById('height').value || "غير محدد";
            const goal = document.getElementById('goal').value || "غير محدد";

            const phoneNumber = "9647746356391"; // رقم الواتساب المربوط بالدكمة
            
            // صياغة الرسالة التلقائية المرتبة
            const message = السلام عليكم كابتن، أود الحصول على خطتي البدنية والغذائية المخصصة.%0A%0A📊 *بيانات الجسم المكتملة:*%0A- العمر: ${age} سنة%0A- الوزن: ${weight} كغم%0A- الطول: ${height} سم%0A- الهدف الأساسي: ${goal}%0A%0Aيرجى إرسال تفاصيل الخطة والسعرات المناسبة لي بالاعتماد على هذه البيانات.;

            // فتح الرابط المباشر للواتساب
            window.open(https://wa.me/${phoneNumber}?text=${message}, '_blank');
        }
    </script>

</body>
</html>
