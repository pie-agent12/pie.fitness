<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pie Fitness</title>
    <style>
        body {
            background-color: #0c0d12;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            gap: 1.5rem;
            padding: 1rem;
            box-sizing: border-box;
        }

        .textWrapper {
          height: fit-content;
          min-width: 3rem;
          width: fit-content;
          font-size: 1.6rem;
          font-weight: 700;
          letter-spacing: 0.25ch;
          position: relative;
          z-index: 1;
          color: white;
          margin-bottom: 0.5rem;
        }

        .invertbox {
          position: absolute;
          height: 100%;
          aspect-ratio: 1/1;
          left: 0;
          top: 0;
          border-radius: 20%;
          background-color: rgba(255, 255, 255, 0.1);
          backdrop-filter: invert(100%);
          animation: move 2s ease-in-out infinite;
        }

        @keyframes move {
          50% {
            left: calc(100% - 2.5rem);
          }
        }

        .card {
          --white: hsl(0, 0%, 100%);
          --black: hsl(240, 15%, 9%);
          --paragraph: hsl(0, 0%, 83%);
          --line: hsl(240, 9%, 17%);
          --primary: hsl(189, 92%, 58%);

          position: relative;
          z-index: 5;
          display: flex;
          flex-direction: column;
          gap: 1rem;

          padding: 1.5rem;
          width: 100%;
          max-width: 19rem;
          background-color: hsla(240, 15%, 9%, 1);
          background-image: radial-gradient(at 88% 40%, hsla(240, 15%, 9%, 1) 0px, transparent 85%),
            radial-gradient(at 49% 30%, hsla(240, 15%, 9%, 1) 0px, transparent 85%),
            radial-gradient(at 14% 26%, hsla(240, 15%, 9%, 1) 0px, transparent 85%),
            radial-gradient(at 0% 64%, hsl(189, 99%, 26%) 0px, transparent 85%),
            radial-gradient(at 41% 94%, hsl(189, 97%, 36%) 0px, transparent 85%),
            radial-gradient(at 100% 99%, hsl(188, 94%, 13%) 0px, transparent 85%);

          border-radius: 1rem;
          box-shadow: 0px -16px 24px 0px rgba(255, 255, 255, 0.25) inset;
          overflow: hidden;
          box-sizing: border-box;
        }

        .card .card_title__container .card_title {
          font-size: 1.2rem;
          font-weight: bold;
          color: var(--white);
          margin: 0;
        }

        .card .card_title__container .card_paragraph {
          margin-top: 0.5rem;
          width: 85%;
          font-size: 0.75rem;
          color: var(--paragraph);
          line-height: 1.4;
        }

        .card .line {
          width: 100%;
          height: 0.1rem;
          background-color: var(--line);
          border: none;
          margin: 0;
        }

        .card .card__list {
          display: flex;
          flex-direction: column;
          gap: 0.75rem;
          padding: 0;
          margin: 0;
          list-style: none;
        }

        .card .cardlist .cardlist_item {
          display: flex;
          align-items: center;
          gap: 0.75rem;
        }

        .card .cardlist .cardlist_item .check {
          display: flex;
          justify-content: center;
          align-items: center;
          width: 1.2rem;
          height: 1.2rem;
          background-color: var(--primary);
          border-radius: 50%;
          flex-shrink: 0;
        }

        .card .cardlist .cardlist_item .check svg {
          width: 0.75rem;
          height: 0.75rem;
          fill: var(--black);
        }

        .card .cardlist .cardlist_item .list_text {
          font-size: 0.85rem;
          color: var(--white);
        }
        .card .button {
          cursor: pointer;
          padding: 0.75rem;
          width: 100%;
          background-image: linear-gradient(0deg, hsl(189, 92%, 58%), hsl(189, 99%, 26%) 100%);
          font-size: 0.85rem;
          font-weight: bold;
          color: var(--white);
          border: 0;
          border-radius: 9999px;
          box-shadow: inset 0 -2px 25px -4px var(--white);
          transition: transform 0.2s;
          position: relative;
          z-index: 9999;
        }

        .card .button:hover {
            transform: scale(1.02);
        }

        .workout-table {
            display: none;
            width: 100%;
            max-width: 19rem;
            background-color: #1a1b23;
            border-radius: 1rem;
            padding: 1.5rem;
            color: white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            box-sizing: border-box;
            z-index: 5;
        }
        .workout-table h3 {
            margin-top: 0;
            color: hsl(189, 92%, 58%);
            font-size: 1.1rem;
        }
        .workout-table p {
            font-size: 0.8rem;
            color: #b3b4bd;
            margin-bottom: 1rem;
            line-height: 1.4;
        }
        .workout-table ul {
            padding-left: 1.2rem;
            margin: 0;
        }
        .workout-table li {
            margin-bottom: 0.5rem;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>

    <div class="textWrapper">
        PIE.FITNESS
        <div class="invertbox"></div>
    </div>

    <div class="card">
        <div class="card_title__container">
            <p class="card_title">Fitness & Workout</p>
            <p class="card_paragraph">Track your exercises, cardio sessions, and daily training plans with high accuracy.</p>
        </div>
        
        <hr class="line">
        
        <ul class="card__list">
            <li class="card__list_item">
                <span class="check">
                    <svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
                </span>
                <span class="list_text">Custom workout plans</span>
            </li>
            <li class="card__list_item">
                <span class="check">
                    <svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
                </span>
                <span class="list_text">Daily progress tracking</span>
            </li>
            <li class="card__list_item">
                <span class="check">
                    <svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
                </span>
                <span class="list_text">Advanced analytics dashboard</span>
            </li>
        </ul>
        
        <button class="button" onclick="startFitnessLogic()">Start Training Now</button>
    </div>

    <div id="workoutDisplay" class="workout-table">
        <h3 id="routineTitle">Custom Training Plan</h3>
        <p id="userStatsText"></p>
        <hr style="border: 0; height: 1px; background: #333; margin-bottom: 1rem;">
        <ul id="routineList"></ul>
    </div>

    <script>
        function startFitnessLogic() {
            let age = prompt("Step 1: Enter your Age (years):");
            if (!age) return;

            let weight = prompt("Step 2: Enter your Weight (kg):");
            if (!weight) return;

            let height = prompt("Step 3: Enter your Height (cm):");
            if (!height) return;

            age = parseFloat(age);
            weight = parseFloat(weight);
            height = parseFloat(height);

            let heightInMeters = height / 100;
            let bmi = weight / (heightInMeters * heightInMeters);
            let displayBox = document.getElementById('workoutDisplay');
            let statsText = document.getElementById('userStatsText');
            let list = document.getElementById('routineList');
            let title = document.getElementById('routineTitle');
            
            statsText.innerHTML = <b>Profile:</b> ${age} yrs | ${weight} kg | ${height} cm<br><b>BMI:</b> ${bmi.toFixed(1)};
            
            if (bmi < 18.5) {
                title.innerText = "💪 Muscle Gain Plan (ضخامة وعضل)";
                list.innerHTML = "<li>🏋️‍♂️ 4 Sets of Heavy Dumbbell Squats</li>" +
                                 "<li>💪 3 Sets of Pull-ups or Lat Pulldowns</li>" +
                                 "<li>🔥 4 Sets of Diamond Push-ups</li>" +
                                 "<li>🍌 Eat 500+ extra calories today!</li>";
            } else if (bmi >= 18.5 && bmi < 25) {
                title.innerText = "⚡ Shred & Tone Plan (تقسيم ولياقة)";
                list.innerHTML = "<li>🏃‍♂️ 15 Mins High-Intensity Cardio (HIIT)</li>" +
                                 "<li>🏋️‍♂️ 3 Sets of Jump Squats</li>" +
                                 "<li>🔥 3 Sets of Standard Push-ups</li>" +
                                 "<li>⏱️ 2 Mins Plank Hold</li>";
            } else {
                title.innerText = "🔥 Fat Burn & Cardio Plan (حرق دهون مكثف)";
                list.innerHTML = "<li>🏃‍♂️ 25 Mins Fast Pace Treadmill Run</li>" +
                                 "<li>💦 4 Sets of Burpees (12 Reps)</li>" +
                                 "<li>🚴‍♂️ 10 Mins Stationary Cycling</li>" +
                                 "<li>🥗 Focus on High Protein & Low Carbs today!</li>";
            }
            
            displayBox.style.display = "block";
            displayBox.scrollIntoView({ behavior: 'smooth' });
        }
    </script>

</body>
</html>
